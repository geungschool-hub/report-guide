<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>과학 탐구 보고서, 이렇게 쓴다</title>
<style>
  :root{
    --bg:#f5f4fb; --card:#ffffff; --ink:#241f33; --muted:#6d6a82;
    --primary:#6d5ae0; --primary-d:#584ac6; --primary-t:#efecfc;
    --good:#158a52; --good-bg:#e9f7ef; --good-line:#b6e3c9;
    --bad:#d8483c; --bad-bg:#fdecea; --bad-line:#f4c4bf;
    --amber:#b8791f; --amber-bg:#fdf3e2;
    --line:#e7e3f2; --radius:16px;
    --shadow:0 6px 24px rgba(60,45,120,.10);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;overflow:hidden}
  body{
    font-family:"Malgun Gothic","맑은 고딕",-apple-system,"Segoe UI",sans-serif;
    color:var(--ink);background:var(--bg);
    font-size:16px;line-height:1.65;-webkit-text-size-adjust:100%;
  }
  #app{display:flex;flex-direction:column;height:100dvh}

  /* ── 헤더 ── */
  header{flex:0 0 auto;background:linear-gradient(135deg,#6d5ae0,#8b6ff0);color:#fff;
    padding:14px 18px calc(10px + env(safe-area-inset-top,0)) 18px;padding-top:calc(14px + env(safe-area-inset-top,0))}
  .h-row{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .h-title{font-size:18px;font-weight:800;letter-spacing:-.02em}
  .h-count{font-size:14px;font-weight:700;opacity:.9;white-space:nowrap}
  .h-sub{font-size:12.5px;opacity:.85;margin-top:2px}
  .bar{height:6px;border-radius:6px;background:rgba(255,255,255,.28);margin-top:10px;overflow:hidden}
  .bar > i{display:block;height:100%;background:#fff;border-radius:6px;transition:width .35s ease}

  /* ── 단계 네비 ── */
  nav{flex:0 0 auto;background:var(--card);border-bottom:1px solid var(--line);
    display:flex;gap:8px;padding:10px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  nav::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;min-width:46px;height:46px;border-radius:13px;border:2px solid var(--line);
    background:#fbfaff;color:var(--muted);font-size:20px;font-weight:800;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;gap:2px;
    transition:.15s;padding:0 8px}
  .chip small{font-size:9.5px;font-weight:700;letter-spacing:-.02em}
  .chip .num{font-size:16px}
  .chip:hover{border-color:#cfc7ee}
  .chip.on{background:var(--primary-t);border-color:var(--primary);color:var(--primary-d)}
  .chip.done{border-color:var(--good-line)}

  /* ── 본문 ── */
  .content{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px 28px}
  .wrap{max-width:720px;margin:0 auto}
  .eyebrow{font-size:13px;font-weight:800;color:var(--primary-d);letter-spacing:.02em}
  .screen-title{font-size:24px;font-weight:800;letter-spacing:-.02em;margin:2px 0 4px;display:flex;align-items:center;gap:10px}
  .screen-title .ic{font-size:26px}
  .goal{color:var(--muted);font-size:15px;margin:0 0 16px}

  /* 강조 하이라이트 */
  .em{font-weight:800;color:var(--primary-d);background:linear-gradient(transparent 55%, #e6dfff 55%);padding:0 1px;border-radius:2px}

  .key{background:var(--primary-t);border:1px solid #d8d0f6;border-radius:var(--radius);
    padding:15px 16px;display:flex;gap:11px;align-items:flex-start;margin-bottom:18px}
  .key .k-ic{font-size:22px;line-height:1.2;flex:0 0 auto}
  .key .k-tx{font-size:17px;font-weight:700;color:#3a2f78;letter-spacing:-.01em}
  .key .k-tx .em{background:linear-gradient(transparent 55%, #d6c9ff 55%)}

  .block{margin-bottom:20px}
  .block > h3{font-size:15px;font-weight:800;margin:0 0 9px;color:var(--ink);display:flex;align-items:center;gap:7px}
  ul.clean{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
  ul.clean li{position:relative;padding-left:24px;font-size:15.5px}
  ul.clean li::before{content:"";position:absolute;left:4px;top:9px;width:8px;height:8px;border-radius:50%;background:var(--primary);opacity:.6}

  .gb{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.gb{grid-template-columns:1fr}}
  .ex{border-radius:14px;padding:13px 14px;border:1.5px solid}
  .ex.good{background:var(--good-bg);border-color:var(--good-line)}
  .ex.bad{background:var(--bad-bg);border-color:var(--bad-line)}
  .ex .tag{font-size:13px;font-weight:800;margin-bottom:7px;display:flex;align-items:center;gap:6px}
  .ex.good .tag{color:var(--good)} .ex.bad .tag{color:var(--bad)}
  .ex .tx{font-size:14.5px;white-space:pre-wrap;line-height:1.6}
  .ex .why{margin-top:9px;font-size:13px;padding-top:8px;border-top:1px dashed rgba(0,0,0,.13);color:#4a4658}
  .ex .why b{font-weight:800}
  .ex.good .why .em{color:var(--good);background:linear-gradient(transparent 55%, #cdeed9 55%)}
  .ex.bad .why .em{color:var(--bad);background:linear-gradient(transparent 55%, #f8d6d2 55%)}

  .tips{background:var(--amber-bg);border:1px solid #f2dcb4;border-radius:14px;padding:13px 15px}
  .tips h3{color:var(--amber)}
  .tips ul.clean li::before{background:var(--amber);opacity:.7}
  .tips .em{color:var(--amber);background:linear-gradient(transparent 55%, #f6e4c2 55%)}

  /* 직접 해보기 */
  .doit{background:#fbfaff;border:1px dashed #c9bff0;border-radius:14px;padding:15px}
  .doit h3{color:var(--primary-d)}
  .field{margin-top:12px}
  .field:first-of-type{margin-top:6px}
  .field label{display:block;font-size:14px;font-weight:700;margin-bottom:6px;color:#3a3550}
  .field textarea{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:11px 12px;
    font-family:inherit;font-size:15.5px;line-height:1.55;resize:vertical;min-height:52px;background:#fff;color:var(--ink)}
  .field textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-t)}

  /* 표/카드 (인용·구조) */
  .rule{border:1px solid var(--line);border-radius:13px;padding:13px 14px;margin-bottom:11px;background:#fff}
  .rule .r-src{font-weight:800;font-size:15px;color:var(--primary-d);margin-bottom:5px}
  .rule .r-fmt{font-size:13.5px;color:var(--muted);background:#f6f4fc;border-radius:8px;padding:7px 9px;margin-bottom:7px}
  .rule .r-ex{font-size:14.5px}
  .rule .r-ex b{color:var(--good)}
  .struct{border:1px solid var(--line);border-radius:13px;overflow:hidden;background:#fff}
  .struct .row{display:flex;gap:0;border-top:1px solid var(--line)}
  .struct .row:first-child{border-top:none}
  .struct .part{flex:0 0 84px;background:var(--primary-t);color:var(--primary-d);font-weight:800;
    font-size:14.5px;padding:12px 10px;display:flex;align-items:center;justify-content:center;text-align:center}
  .struct .desc{padding:12px 13px;font-size:14.5px;line-height:1.55}

  /* 체크리스트 */
  .ck-head{display:flex;align-items:center;justify-content:space-between;background:var(--primary-t);
    border-radius:13px;padding:12px 15px;margin-bottom:14px;font-weight:800;color:var(--primary-d)}
  .ck-head .n{font-size:22px}
  .ck{display:flex;flex-direction:column;gap:9px}
  .ck-item{display:flex;gap:11px;align-items:flex-start;border:1.5px solid var(--line);border-radius:12px;
    padding:12px 13px;background:#fff;cursor:pointer;transition:.12s;font-size:15px}
  .ck-item:hover{border-color:#cfc7ee}
  .ck-item.done{background:var(--good-bg);border-color:var(--good-line)}
  .ck-box{flex:0 0 auto;width:24px;height:24px;border-radius:7px;border:2px solid #c7c0e0;background:#fff;
    display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;margin-top:1px}
  .ck-item.done .ck-box{background:var(--good);border-color:var(--good)}
  .ck-done-msg{margin-top:14px;text-align:center;background:var(--good-bg);border:1px solid var(--good-line);
    border-radius:13px;padding:15px;color:var(--good);font-weight:800;display:none;line-height:1.5}

  /* 계획서 */
  .plan-intro{color:var(--muted);font-size:14.5px;margin-bottom:14px}
  .plan-step{border:1px solid var(--line);border-radius:13px;background:#fff;padding:14px;margin-bottom:12px}
  .plan-step .ps-t{font-weight:800;color:var(--primary-d);margin-bottom:9px;font-size:15px}
  .plan-q{font-size:13px;color:var(--muted);font-weight:700;margin-top:9px}
  .plan-a{font-size:15px;white-space:pre-wrap;padding:2px 0 0}
  .plan-a.empty{color:#bbb6cc;font-style:italic}
  .plan-actions{display:flex;gap:10px;flex-wrap:wrap;margin:6px 0 4px}

  /* ── 푸터 ── */
  footer{flex:0 0 auto;background:var(--card);border-top:1px solid var(--line);
    padding:10px 14px calc(10px + env(safe-area-inset-bottom,0))}
  .nav-btns{display:flex;gap:10px;max-width:720px;margin:0 auto}
  .btn{flex:1;min-height:48px;border-radius:13px;border:none;font-family:inherit;font-size:16px;font-weight:800;
    cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:6px;padding:0 14px}
  .btn.prev{background:#f0eef8;color:var(--primary-d)}
  .btn.next{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(109,90,224,.35)}
  .btn.next:hover{background:var(--primary-d)}
  .btn.prev:hover{background:#e6e2f4}
  .btn:disabled{opacity:.4;cursor:default;box-shadow:none}
  .btn.ghost{background:#fff;border:1.5px solid var(--line);color:var(--muted);flex:0 0 auto;min-width:120px}
  .btn.copy{background:var(--good);color:#fff;flex:0 0 auto;min-width:130px}
  .credit{text-align:center;font-size:11.5px;color:#a7a2ba;margin-top:9px}

  /* 제출자 정보 입력 */
  .field input{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:11px 12px;font-family:inherit;font-size:15.5px;background:#fff;color:var(--ink)}
  .field input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-t)}
  /* 제출 안내 박스 */
  .notice{background:#eef7ff;border:1px solid #bfe0f5;border-radius:13px;padding:13px 15px;margin-bottom:14px;font-size:14px;line-height:1.65}
  .notice .mail{display:inline-block;font-weight:800;color:#1565c0;background:#fff;border:1px solid #bfe0f5;border-radius:8px;padding:3px 9px;margin-top:5px;font-size:14.5px;user-select:all}
  .notice .opt{margin-top:7px;padding-left:2px}
  .notice .small{display:block;margin-top:9px;color:#5a6b7a;font-size:12.5px}
  .btn.export{background:#e2564a;color:#fff;flex:0 0 auto;min-width:150px;box-shadow:0 4px 12px rgba(226,86,74,.3)}
  .btn.export:hover{background:#c9463b}

  /* 인쇄(PDF 내보내기)용 문서 — 화면에선 숨김, 인쇄 때만 보임 */
  #printdoc{display:none}
  @media print{
    html,body{height:auto;overflow:visible;background:#fff}
    #app{display:none!important}
    #printdoc{display:block!important;color:#000;font-family:"Malgun Gothic","맑은 고딕",serif}
    .pd-title{font-size:19pt;font-weight:800;text-align:center;margin:0 0 6pt}
    .pd-meta{display:flex;gap:18pt;justify-content:center;border-bottom:1.5pt solid #333;padding-bottom:8pt;margin-bottom:12pt;font-size:11pt}
    .pd-step{margin-bottom:11pt;page-break-inside:avoid}
    .pd-h{font-weight:800;font-size:12.5pt;background:#eee;padding:4pt 7pt;border-left:3pt solid #444;margin-bottom:4pt}
    .pd-q{font-weight:700;font-size:10.5pt;color:#333;margin-top:6pt}
    .pd-a{font-size:11.5pt;white-space:pre-wrap}
    .pd-foot{margin-top:14pt;border-top:1pt solid #999;padding-top:6pt;font-size:9.5pt;color:#555;text-align:center}
    @page{margin:16mm}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="h-row">
      <div class="h-title">🔬 과학 탐구 보고서, 이렇게 쓴다</div>
      <div class="h-count" id="count">1 / 11</div>
    </div>
    <div class="h-sub">주제 정하기부터 고찰·인용까지 — 단계를 넘기며 내 보고서를 만든다</div>
    <div class="bar"><i id="barfill"></i></div>
  </header>

  <nav id="nav"></nav>

  <main class="content" id="content"><div class="wrap" id="screen"></div></main>

  <footer>
    <div class="nav-btns">
      <button class="btn prev" id="prev">◀ 이전</button>
      <button class="btn next" id="next">다음 ▶</button>
    </div>
    <div class="credit">Claude AI로 이 앱을 제작함 by 고은표</div>
  </footer>
</div>

<div id="printdoc" aria-hidden="true"></div>

<script type="application/json" id="report-data">
{
"steps":[
{
"id":"topic","icon":"🎯","title":"1. 주제와 탐구 질문 정하기",
"keyIdea":"넓은 '주제'를 **딱 하나의 질문**으로 좁힌다. 그래야 보고서가 갈 곳이 생긴다.",
"goal":"궁금한 과학 주제를 골라, 이 보고서에서 답할 **탐구 질문 하나**로 좁힌다.",
"explain":[
"'주제'는 넓은 분야, '탐구 질문'은 그 안에서 내가 답할 **딱 하나의 물음**이다.",
"좋은 질문은 **물음표로 끝난다.** 읽으면 뭘 알아볼지가 바로 보인다.",
"대상·조건·범위를 넣어 좁힌다. '누구에게, 어떤 상황에서, 무엇을'을 붙이면 된다.",
"검색 한 번에 답 나오는 질문은 피한다. 자료를 모아 따져 봐야 답이 나오는 게 **좋은 질문**이다.",
"지금 답을 미리 정할 필요 없다. 답이 궁금하면 그걸로 충분하다."
],
"good":{"text":"주제: 카페인 → 탐구 질문: '고등학생이 오후 6시 이후 마신 커피(카페인 100mg 이상)는 그날 밤 잠드는 시간과 수면의 질을 얼마나 떨어뜨릴까?'","why":"대상·조건·알아볼 것이 다 분명하다. 그래서 **뭘 찾을지 바로 정해진다.**"},
"bad":{"text":"주제: 카페인 → 탐구 질문: '카페인은 몸에 나쁠까?'","why":"누구에게·얼마나·뭐가 나쁜지가 없다. **너무 넓어서** 어디서부터 조사할지 안 보인다."},
"tips":[
"큰 주제가 떠오르면 '어떤 대상에게?' '어떤 조건에서?'를 붙여 **자꾸 좁힌다.**",
"'얼마나', 'A와 B 중 어디가' 같은 **비교·정도**를 넣으면 조사가 쉬워진다.",
"검색창에 질문을 넣어 확인한다. 자료가 넘치면 너무 넓은 것, 하나도 없으면 너무 좁은 것이다.",
"관심 있는 뉴스·건강 습관·환경 얘기에서 시작하면 **끝까지 안 지친다.**"
],
"templatePrompts":[
{"label":"내 보고서의 큰 주제","placeholder":"예: 미세먼지, 카페인, 당류 섭취, 플라스틱, 수면"},
{"label":"좁힌 탐구 질문 (물음표로 끝내기)","placeholder":"예: 미세먼지 '나쁨'인 날 야외 운동은 폐 건강에 얼마나 부담이 될까?"},
{"label":"이 질문에 답하려면 무엇을 알아봐야 할까","placeholder":"예: 미세먼지 농도 기준, 운동 시 호흡량 변화, 폐에 미치는 영향 자료"}
]
},
{
"id":"claim","icon":"⚖️","title":"2. 주장과 논거 이해하기",
"keyIdea":"주장은 '내 생각', 논거는 그걸 받치는 **사실·자료**다. 논거 없는 주장? 그냥 **우기는 거다.**",
"goal":"'사실'과 '주장'을 구분하고, 주장 뒤에 **논거(자료·수치·통계)**를 붙이는 감각을 익힌다.",
"explain":[
"사실은 누가 봐도 맞는 것. \"에너지 음료 한 캔에 카페인 100mg\" 같은 거다.",
"주장은 그걸 두고 내가 내린 생각·입장이다. \"청소년은 에너지 음료를 줄여야 한다\" 이런 것.",
"논거는 주장을 받치는 **이유와 증거.** 수치·실험결과·통계·전문가 견해가 논거가 된다.",
"논거 없이 주장만 던지면 **\"그래서 근거는?\"** 한마디에 끝난다. 논거가 붙어야 설득이 된다.",
"**주장 하나엔 논거 하나.** 짝을 꼭 붙인다."
],
"good":{"text":"에너지 음료 한 캔에는 카페인이 약 100mg 들어 있다. 식약처 기준 청소년 하루 카페인 권장량은 체중 50kg일 때 125mg인데, 두 캔만 마셔도 이 양을 넘는다. 카페인을 많이 마시면 심장 박동이 빨라지고 잠들기 어려워진다. 그래서 청소년은 에너지 음료 섭취를 줄이는 게 좋다.","why":"수치·기준·몸에서 일어나는 일까지 논거로 깔고 주장을 냈다. 그래서 **설득력이 있다.**"},
"bad":{"text":"에너지 음료는 몸에 안 좋다. 그러니까 청소년은 마시면 안 된다.","why":"'안 좋다'는 **주장뿐**, 왜인지가 없다. 그냥 개인 의견으로만 들린다."},
"tips":[
"문장을 쓴 뒤 **'그걸 어떻게 알아?'**라고 스스로 묻는다. 답이 없으면 논거가 빠진 것이다.",
"논거엔 **숫자**를 넣는다. '많다'보다 '100mg'이 훨씬 세다.",
"자료를 가져올 땐 **출처도 같이** 적는다. (식약처, 교과서, 논문 이름 등)",
"'~인 것 같다'는 뺀다. **확인된 사실**만 논거로 쓴다."
],
"templatePrompts":[

<script>
"use strict";
var DATA = JSON.parse(document.getElementById('report-data').textContent);

/* 화면 구성: 7단계 + 인용/구조/체크리스트/계획서 */
var SCREENS = [];
DATA.steps.forEach(function(s){ SCREENS.push({kind:'step', step:s}); });
SCREENS.push({kind:'citation', icon:'📌', label:'인용·출처'});
SCREENS.push({kind:'structure', icon:'📋', label:'구조'});
SCREENS.push({kind:'checklist', icon:'✅', label:'점검'});
SCREENS.push({kind:'plan', icon:'📝', label:'계획서'});

var LS = 'bogoseo_guide_v1';
var store = loadStore();
var idx = Math.min(store.idx || 0, SCREENS.length - 1);

function loadStore(){
  try{ var s = JSON.parse(localStorage.getItem(LS)); if(s && typeof s==='object'){ s.inputs=s.inputs||{}; s.checks=s.checks||{}; return s; } }catch(e){}
  return {inputs:{}, checks:{}, idx:0};
}
function save(){ try{ store.idx = idx; localStorage.setItem(LS, JSON.stringify(store)); }catch(e){} }
function esc(t){ return String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
/* **핵심**을 하이라이트로 */
function em(t){ return esc(t).replace(/\*\*([^*]+)\*\*/g,'<span class="em">$1</span>'); }

/* ── 네비게이션 렌더 ── */
function renderNav(){
  var nav = document.getElementById('nav');
  nav.innerHTML = SCREENS.map(function(sc,i){
    var on = i===idx ? ' on':'';
    var inner;
    if(sc.kind==='step'){ inner = '<span class="num">'+(i+1)+'</span><small>'+esc(sc.step.icon)+'</small>'; }
    else { inner = '<span>'+esc(sc.icon)+'</span><small>'+esc(sc.label)+'</small>'; }
    var title = sc.kind==='step' ? esc(sc.step.title) : esc(sc.label);
    return '<button class="chip'+on+'" data-i="'+i+'" title="'+title+'">'+inner+'</button>';
  }).join('');
  var cur = nav.querySelector('.chip.on');
  if(cur && cur.scrollIntoView){ cur.scrollIntoView({inline:'center', block:'nearest'}); }
}

/* ── 각 화면 렌더 ── */
function listHTML(arr){ return '<ul class="clean">'+arr.map(function(x){return '<li>'+em(x)+'</li>';}).join('')+'</ul>'; }

function renderStep(s){
  var h = '';
  h += '<div class="eyebrow">단계 '+ (idx+1) +' / 7 · 보고서 쓰기</div>';
  h += '<div class="screen-title"><span class="ic">'+esc(s.icon)+'</span>'+esc(s.title.replace(/^\d+\.\s*/,''))+'</div>';
  h += '<p class="goal">'+em(s.goal)+'</p>';
  h += '<div class="key"><span class="k-ic">💡</span><span class="k-tx">'+em(s.keyIdea)+'</span></div>';

  h += '<div class="block"><h3>📖 이렇게 이해한다</h3>'+listHTML(s.explain)+'</div>';

  h += '<div class="block"><div class="gb">';
  h += '<div class="ex good"><div class="tag">👍 이게 잘 쓴 글</div><div class="tx">'+em(s.good.text)+'</div><div class="why"><b>왜 좋냐면 </b>'+em(s.good.why)+'</div></div>';
  h += '<div class="ex bad"><div class="tag">👎 이건 흔한 실수</div><div class="tx">'+em(s.bad.text)+'</div><div class="why"><b>왜 아쉽냐면 </b>'+em(s.bad.why)+'</div></div>';
  h += '</div></div>';

  h += '<div class="block tips"><h3>🍯 꿀팁</h3>'+listHTML(s.tips)+'</div>';

  h += '<div class="block doit"><h3>✏️ 직접 해보기 <span style="font-weight:600;color:#8a84a3;font-size:12.5px">(자동 저장된다)</span></h3>';
  s.templatePrompts.forEach(function(tp, j){
    var key = s.id+':'+j;
    var val = store.inputs[key] || '';
    h += '<div class="field"><label>'+esc(tp.label)+'</label>'+
         '<textarea data-key="'+key+'" placeholder="'+esc(tp.placeholder)+'">'+esc(val)+'</textarea></div>';
  });
  h += '</div>';
  return h;
}

function renderCitation(){
  var c = DATA.citation, h='';
  h += '<div class="eyebrow">참고 자료</div><div class="screen-title"><span class="ic">📌</span>인용하고 출처 밝히기</div>';
  h += '<div class="key"><span class="k-ic">💡</span><span class="k-tx">'+em(c.intro)+'</span></div>';
  h += '<div class="block"><h3>🚫 표절을 피하려면</h3>'+listHTML(c.plagiarism)+'</div>';
  h += '<div class="block"><h3>✍️ 자료 종류별 출처 쓰는 법</h3>';
  c.rules.forEach(function(r){
    h += '<div class="rule"><div class="r-src">'+esc(r.source)+'</div>'+
         '<div class="r-fmt">'+esc(r.format)+'</div>'+
         '<div class="r-ex"><b>예) </b>'+esc(r.example)+'</div></div>';
  });
  h += '</div>';
  return h;
}

function renderStructure(){
  var st = DATA.extras.structure, h='';
  h += '<div class="eyebrow">한눈에 보기</div><div class="screen-title"><span class="ic">📋</span>보고서 전체 구조</div>';
  h += '<p class="goal">보고서는 아래 순서로 짜인다. 각 칸에 뭘 쓰는지 확인한다.</p>';
  h += '<div class="struct">';
  st.forEach(function(p){
    h += '<div class="row"><div class="part">'+esc(p.part)+'</div><div class="desc">'+em(p.desc)+'</div></div>';
  });
  h += '</div>';
  return h;
}

function renderChecklist(){
  var ck = DATA.extras.checklist, h='';
  var done = ck.reduce(function(a,_,i){return a + (store.checks[i]?1:0);},0);
  h += '<div class="eyebrow">제출 전 마지막 관문</div><div class="screen-title"><span class="ic">✅</span>자기 점검 체크리스트</div>';
  h += '<div class="ck-head"><span>스스로 확인한다</span><span class="n">'+done+' / '+ck.length+'</span></div>';
  h += '<div class="ck">';
  ck.forEach(function(t,i){
    var on = store.checks[i] ? ' done':'';
    h += '<div class="ck-item'+on+'" data-ck="'+i+'"><span class="ck-box">'+(store.checks[i]?'✔':'')+'</span><span>'+em(t)+'</span></div>';
  });
  h += '</div>';
  h += '<div class="ck-done-msg" id="ckdone" style="'+(done===ck.length?'display:block':'')+'">🎉 전부 확인 완료! 이제 자신 있게 제출한다.</div>';
  return h;
}

function renderPlan(){
  var h='';
  h += '<div class="eyebrow">지금까지 채운 내용</div><div class="screen-title"><span class="ic">📝</span>내 보고서 계획서</div>';
  h += '<p class="plan-intro">각 단계 \'직접 해보기\'에 적은 내용을 한곳에 모았다. 아래 정보를 채우고 <b>PDF로 내보내</b> 제출하거나, 이를 바탕으로 보고서를 써서 낼 수 있다.</p>';

  h += '<div class="doit" style="margin-bottom:14px"><h3>🧾 제출자 정보</h3>'+
       '<div class="field"><label>학번</label><input class="meta-in" data-meta="sid" type="text" inputmode="numeric" placeholder="예: 20701" value="'+esc(store.sid||'')+'"></div>'+
       '<div class="field"><label>이름</label><input class="meta-in" data-meta="name" type="text" placeholder="예: 김생명" value="'+esc(store.name||'')+'"></div></div>';

  h += '<div class="notice"><b>📮 제출 방법 — 아래 셋 중 하나를 고른다</b>'+
       '<div class="opt"><b>① 계획서 제출</b> — 이 계획서를 PDF로 내보내 제출한다.</div>'+
       '<div class="opt"><b>② 보고서 제출</b> — 계획서를 바탕으로 보고서를 제대로 작성해 제출한다.</div>'+
       '<div class="opt"><b>③ 발표까지</b> — 보고서를 쓰고 수업에서 발표한다.</div>'+
       '<span class="small">셋 다 세특(과목별 세부능력 및 특기사항)에 반영된다. ①·②는 <b>학번·이름</b>을 적어 아래 이메일로 보낸다.</span><br>'+
       '<span class="mail">geungschool@hyehwa-h.sen.hs.kr</span></div>';

  h += '<div class="plan-actions">'+
       '<button class="btn export" id="exportpdf">📄 PDF로 내보내기</button>'+
       '<button class="btn copy" id="copyplan">📋 전체 복사</button>'+
       '<button class="btn ghost" id="resetall">🗑 전체 지우기</button></div>';
  var any=false;
  DATA.steps.forEach(function(s){
    var rows='';
    s.templatePrompts.forEach(function(tp,j){
      var v = (store.inputs[s.id+':'+j]||'').trim();
      if(v) any=true;
      rows += '<div class="plan-q">'+esc(tp.label)+'</div><div class="plan-a'+(v?'':' empty')+'">'+(v?esc(v):'(아직 안 적음)')+'</div>';
    });
    h += '<div class="plan-step"><div class="ps-t">'+esc(s.icon)+' '+esc(s.title)+'</div>'+rows+'</div>';
  });
  if(!any){ h += '<p class="plan-intro" style="text-align:center">아직 적은 내용이 없다. 각 단계의 ✏️ 직접 해보기를 먼저 채운다.</p>'; }
  return h;
}

function buildPlanText(){
  var out = ['[ 과학 탐구 보고서 계획서 ]', '학번: '+(store.sid||''), '이름: '+(store.name||''), ''];
  DATA.steps.forEach(function(s){
    out.push('■ '+s.title);
    s.templatePrompts.forEach(function(tp,j){
      var v=(store.inputs[s.id+':'+j]||'').trim();
      out.push('· '+tp.label+': '+(v||'(미작성)'));
    });
    out.push('');
  });
  out.push('※ 제출(택1): ①계획서  ②보고서  ③발표 — 셋 다 세특 반영.');
  out.push('※ ①·②는 학번·이름과 함께 geungschool@hyehwa-h.sen.hs.kr 로 보낸다.');
  return out.join('\n');
}

/* PDF 내보내기 = 인쇄용 문서 채우고 브라우저 인쇄(→ PDF로 저장) */
function buildPrintDoc(){
  var today='';
  try{ var dt=new Date(); today = dt.getFullYear()+'. '+(dt.getMonth()+1)+'. '+dt.getDate()+'.'; }catch(e){}
  var h='';
  h += '<div class="pd-title">과학 탐구 보고서 계획서</div>';
  h += '<div class="pd-meta"><span>학번: '+esc(store.sid||'________')+'</span><span>이름: '+esc(store.name||'________')+'</span><span>작성일: '+esc(today)+'</span></div>';
  DATA.steps.forEach(function(s){
    h += '<div class="pd-step"><div class="pd-h">'+esc(s.title)+'</div>';
    s.templatePrompts.forEach(function(tp,j){
      var v=(store.inputs[s.id+':'+j]||'').trim();
      h += '<div class="pd-q">'+esc(tp.label)+'</div><div class="pd-a">'+(v?esc(v):'—')+'</div>';
    });
    h += '</div>';
  });
  h += '<div class="pd-foot">제출: '+esc(store.sid||'')+' '+esc(store.name||'')+'  ·  geungschool@hyehwa-h.sen.hs.kr</div>';
  document.getElementById('printdoc').innerHTML = h;
}
function doExport(){
  if(!(store.sid&&store.sid.trim()) || !(store.name&&store.name.trim())){
    if(!confirm('학번 또는 이름이 비어 있다. 그래도 PDF로 내보낼까?\n(인쇄 창에서 대상을 \"PDF로 저장\"으로 선택한다.)')) return;
  }
  buildPrintDoc();
  window.print();
}

/* ── 메인 렌더 ── */
function render(){
  var sc = SCREENS[idx];
  var el = document.getElementById('screen');
  if(sc.kind==='step') el.innerHTML = renderStep(sc.step);
  else if(sc.kind==='citation') el.innerHTML = renderCitation();
  else if(sc.kind==='structure') el.innerHTML = renderStructure();
  else if(sc.kind==='checklist') el.innerHTML = renderChecklist();
  else if(sc.kind==='plan') el.innerHTML = renderPlan();

  document.getElementById('count').textContent = (idx+1)+' / '+SCREENS.length;
  document.getElementById('barfill').style.width = ((idx+1)/SCREENS.length*100)+'%';
  document.getElementById('prev').disabled = idx===0;
  var next = document.getElementById('next');
  next.disabled = idx===SCREENS.length-1;
  next.innerHTML = idx===SCREENS.length-2 ? '계획서 보기 ▶' : '다음 ▶';
  document.getElementById('content').scrollTop = 0;
  renderNav();
  save();
}

function go(i){ if(i<0||i>=SCREENS.length) return; idx=i; render(); }

/* ── 이벤트 ── */
document.getElementById('prev').addEventListener('click', function(){ go(idx-1); });
document.getElementById('next').addEventListener('click', function(){ go(idx+1); });
document.getElementById('nav').addEventListener('click', function(e){
  var c = e.target.closest('.chip'); if(c) go(parseInt(c.getAttribute('data-i'),10));
});

/* 본문 위임: 입력 저장 / 체크박스 / 복사 / 초기화 */
var content = document.getElementById('content');
content.addEventListener('input', function(e){
  var ta = e.target.closest('textarea[data-key]');
  if(ta){ store.inputs[ta.getAttribute('data-key')] = ta.value; save(); return; }
  var mi = e.target.closest('input[data-meta]');
  if(mi){ store[mi.getAttribute('data-meta')] = mi.value; save(); return; }
});
content.addEventListener('click', function(e){
  var item = e.target.closest('.ck-item');
  if(item){
    var i = item.getAttribute('data-ck');
    store.checks[i] = !store.checks[i]; save(); render(); return;
  }
  if(e.target.closest('#exportpdf')){ doExport(); return; }
  if(e.target.closest('#copyplan')){ doCopy(); return; }
  if(e.target.closest('#resetall')){ doReset(); return; }
});

function doCopy(){
  var txt = buildPlanText();
  var btn = document.getElementById('copyplan');
  function ok(){ if(btn){ var o=btn.textContent; btn.textContent='✅ 복사됐다'; setTimeout(function(){btn.textContent=o;},1600); } }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(ok, function(){ fallback(txt); ok(); });
  } else { fallback(txt); ok(); }
}
function fallback(txt){
  var t=document.createElement('textarea'); t.value=txt; t.style.position='fixed'; t.style.opacity='0';
  document.body.appendChild(t); t.focus(); t.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(t);
}
function doReset(){
  if(!confirm('직접 적은 내용과 체크 표시를 모두 지운다.\n되돌릴 수 없다. 계속할까?')) return;
  store.inputs={}; store.checks={}; save(); render();
}

/* 키보드 좌우 이동 (입력 중엔 제외) */
document.addEventListener('keydown', function(e){
  if(/^(TEXTAREA|INPUT)$/.test((e.target.tagName||''))) return;
  if(e.key==='ArrowLeft') go(idx-1);
  else if(e.key==='ArrowRight') go(idx+1);
});

render();
</script>
