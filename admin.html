<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>보고서 계획서 · 제출 현황 (교사용)</title>
<style>
  :root{
    --bg:#f5f4fb; --card:#fff; --ink:#241f33; --muted:#6d6a82;
    --primary:#6d5ae0; --primary-d:#584ac6; --primary-t:#efecfc;
    --good:#158a52; --good-bg:#e9f7ef; --good-line:#b6e3c9;
    --bad:#d8483c; --line:#e7e3f2; --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:"Malgun Gothic","맑은 고딕",-apple-system,"Segoe UI",sans-serif;color:var(--ink);
    background:var(--bg);font-size:16px;line-height:1.6;-webkit-text-size-adjust:100%;overflow-wrap:break-word;word-break:break-word}
  .wrap{max-width:860px;margin:0 auto;padding:22px 16px 60px}
  h1{font-size:20px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:13.5px;margin:0 0 18px}
  .hidden{display:none!important}
  input,button{font-family:inherit}
  .field input{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:12px 13px;font-size:16px;background:#fff;color:var(--ink)}
  .field input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-t)}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:13.5px;font-weight:700;margin-bottom:6px;color:#3a3550}
  .btn{border:none;border-radius:11px;font-size:15px;font-weight:800;cursor:pointer;padding:11px 16px;min-height:44px;transition:.15s}
  .btn.primary{background:var(--primary);color:#fff}
  .btn.primary:hover{background:var(--primary-d)}
  .btn.ghost{background:#fff;border:1.5px solid var(--line);color:var(--muted)}
  .btn.sm{font-size:13px;padding:7px 11px;min-height:0}
  .btn.danger{background:#fff;border:1.5px solid #f1c3bd;color:var(--bad)}
  .err{color:var(--bad);font-size:13.5px;min-height:18px;margin-top:6px}

  /* 게이트 */
  .gate{max-width:380px;margin:60px auto 0;background:var(--card);border:1px solid var(--line);
    border-radius:18px;padding:26px 22px;box-shadow:0 8px 28px rgba(60,45,120,.1)}
  .gate h2{margin:0 0 6px;font-size:19px}
  .gate p{color:var(--muted);font-size:13.5px;margin:0 0 16px}

  /* 툴바 */
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
  .count{font-weight:800;color:var(--primary-d)}
  .grow{flex:1;min-width:160px}
  .search{width:100%;border:1.5px solid var(--line);border-radius:999px;padding:10px 16px;font-size:15px;background:#fff}

  /* 목록 */
  .list{display:flex;flex-direction:column;gap:10px}
  .sub-card{border:1px solid var(--line);border-radius:14px;background:#fff;overflow:hidden}
  .sub-head{display:flex;align-items:center;gap:10px;padding:13px 15px;cursor:pointer}
  .sub-head:hover{background:#faf9ff}
  .sid{font-weight:800;color:var(--primary-d);font-variant-numeric:tabular-nums}
  .nm{font-weight:700}
  .when{margin-left:auto;color:var(--muted);font-size:12.5px;white-space:nowrap}
  .caret{color:var(--muted);font-size:13px;transition:transform .15s}
  .sub-card.open .caret{transform:rotate(90deg)}
  .sub-body{display:none;border-top:1px solid var(--line);padding:14px 15px;background:#fbfaff}
  .sub-card.open .sub-body{display:block}
  .sub-body pre{white-space:pre-wrap;font-family:inherit;font-size:14px;margin:0 0 12px;line-height:1.7}
  .row-actions{display:flex;gap:8px;justify-content:flex-end}
  .empty{text-align:center;color:var(--muted);padding:40px 0;font-size:15px}
  footer{margin-top:40px;text-align:center;color:#a7a2ba;font-size:11.5px}
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:#241f33;color:#fff;
    padding:11px 18px;border-radius:999px;font-size:14px;font-weight:700;opacity:0;pointer-events:none;transition:.25s;z-index:50}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <!-- 게이트 -->
  <div class="gate" id="gate">
    <h2>🔒 교사 확인</h2>
    <p id="gateDesc">교사 비밀번호를 입력하세요.</p>
    <div class="field"><input id="gatePw" type="password" placeholder="비밀번호" autocomplete="current-password"></div>
    <div class="field hidden" id="gatePw2Field"><input id="gatePw2" type="password" placeholder="비밀번호 다시 입력" autocomplete="new-password"></div>
    <button class="btn primary" id="gateBtn" style="width:100%">로그인</button>
    <div class="err" id="gateErr"></div>
  </div>

  <!-- 메인 -->
  <div id="main" class="hidden">
    <h1>📝 보고서 계획서 · 제출 현황</h1>
    <p class="sub">학생이 앱에서 [계획서 제출하기]를 누르면 여기 실시간으로 쌓입니다.</p>

    <div class="toolbar">
      <span class="count" id="count">0명 제출</span>
      <span class="grow"><input class="search" id="search" type="search" placeholder="학번·이름 검색"></span>
      <button class="btn ghost sm" id="csvBtn">⬇️ CSV 내보내기</button>
    </div>

    <div class="list" id="list"></div>
  </div>

  <footer>Claude AI로 이 앱을 제작함 by 고은표</footer>
</div>
<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
"use strict";
firebase.initializeApp({
  apiKey: "AIzaSyDbEgNhJr24GjWPYBx63zQ4MyW2dZA6XSs",
  authDomain: "gongju7-vocab.firebaseapp.com",
  databaseURL: "https://gongju7-vocab-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "gongju7-vocab",
  storageBucket: "gongju7-vocab.firebasestorage.app",
  messagingSenderId: "249343659059",
  appId: "1:249343659059:web:532b7d74d0a38286c2a746"
});
var db=firebase.database(), auth=firebase.auth();
var ROOT='reportPlans';
var TPW_SALT='reportplan.teacher.v1';
var TADMIN_KEY='reportplan.teacher.session';

var $=function(id){return document.getElementById(id);};
async function sha256(s){ var b=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)); return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0');}).join(''); }
function tpwHash(pw){ return sha256(TPW_SALT+'|'+pw); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
var toastT=null;
function toast(m){ var t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(function(){t.classList.remove('show');},2200); }
function fmtWhen(ts){ try{ var d=new Date(ts); return (d.getMonth()+1)+'월 '+d.getDate()+'일 '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }catch(e){ return ''; } }

var THASH=null, SUBS=[], query='';

/* ===== 부팅: 무인증 접속(공개 규칙) ===== */
(async function(){
  try{ await auth.signOut(); }catch(e){}
  try{ THASH=(await db.ref(ROOT+'/teacherHash').once('value')).val()||null; }catch(e){ THASH=null; }
  var hasPw=!!THASH;
  if(!hasPw){
    $('gateDesc').textContent='처음이에요. 앞으로 쓸 교사 비밀번호(4자 이상)를 정하세요.';
    $('gatePw2Field').classList.remove('hidden');
    $('gatePw').placeholder='새 비밀번호';
    $('gateBtn').textContent='비밀번호 설정';
  }
  var sess=localStorage.getItem(TADMIN_KEY);
  if(hasPw && sess && sess===THASH){ enterAdmin(); }
})();

async function gateSubmit(){
  var pw=$('gatePw').value.trim(); $('gateErr').textContent='';
  if(pw.length<4){ $('gateErr').textContent='비밀번호는 4자 이상으로 정해 주세요'; return; }
  var b=$('gateBtn'); b.disabled=true;
  try{
    if(!THASH){
      var pw2=$('gatePw2').value.trim();
      if(pw!==pw2){ $('gateErr').textContent='비밀번호가 일치하지 않아요'; return; }
      var h=await tpwHash(pw);
      await db.ref(ROOT+'/teacherHash').set(h);
      THASH=h; localStorage.setItem(TADMIN_KEY,h); enterAdmin();
    } else {
      var h2=await tpwHash(pw);
      if(h2!==THASH){ $('gateErr').textContent='비밀번호가 올바르지 않아요'; return; }
      localStorage.setItem(TADMIN_KEY,h2); enterAdmin();
    }
  }catch(e){ console.error(e); $('gateErr').textContent='⚠️ 오류가 발생했어요. 다시 시도해 주세요 ('+((e&&(e.code||e.message))||'unknown')+')'; }
  finally{ b.disabled=false; }
}
$('gateBtn').addEventListener('click', gateSubmit);
$('gatePw').addEventListener('keydown', function(e){ if(e.key==='Enter'){ if($('gatePw2Field').classList.contains('hidden')) gateSubmit(); else $('gatePw2').focus(); } });
$('gatePw2').addEventListener('keydown', function(e){ if(e.key==='Enter') gateSubmit(); });

function enterAdmin(){
  $('gate').classList.add('hidden'); $('main').classList.remove('hidden');
  db.ref(ROOT).on('value', function(snap){
    var val=snap.val()||{}; SUBS=[];
    Object.keys(val).forEach(function(k){
      if(k==='teacherHash') return;
      var v=val[k]; if(!v || typeof v!=='object') return;
      SUBS.push({ key:k, sid:v.sid||k, name:v.name||'', planText:v.planText||'', submittedAt:v.submittedAt||v.updatedAt||0 });
    });
    SUBS.sort(function(a,b){ return (a.sid+'').localeCompare(b.sid+'', 'ko', {numeric:true}); });
    renderList();
  }, function(err){ console.error('구독 실패', err); toast('불러오기 실패: '+(err&&err.code||'')); });
}

function renderList(){
  var q=query.trim().toLowerCase();
  var list=SUBS.filter(function(s){ if(!q) return true; return (s.sid+' '+s.name).toLowerCase().indexOf(q)>=0; });
  $('count').textContent = SUBS.length+'명 제출'+(q?(' · 검색 '+list.length+'명'):'');
  var box=$('list');
  if(list.length===0){ box.innerHTML='<div class="empty">'+(SUBS.length?'검색 결과가 없어요.':'아직 제출한 학생이 없어요.')+'</div>'; return; }
  box.innerHTML = list.map(function(s){
    return '<div class="sub-card" data-key="'+esc(s.key)+'">'+
      '<div class="sub-head js-toggle"><span class="sid">'+esc(s.sid)+'</span><span class="nm">'+esc(s.name||'(이름 없음)')+'</span>'+
        '<span class="when">'+esc(fmtWhen(s.submittedAt))+'</span><span class="caret">▶</span></div>'+
      '<div class="sub-body"><pre>'+esc(s.planText||'(내용 없음)')+'</pre>'+
        '<div class="row-actions"><button class="btn danger sm js-del">🗑 이 제출 삭제</button></div></div>'+
    '</div>';
  }).join('');
}

$('search').addEventListener('input', function(e){ query=e.target.value; renderList(); });

$('list').addEventListener('click', function(e){
  var card=e.target.closest('.sub-card'); if(!card) return;
  if(e.target.closest('.js-del')){
    var key=card.getAttribute('data-key');
    var s=SUBS.filter(function(x){return x.key===key;})[0];
    if(!s) return;
    if(!confirm((s.name||s.sid)+' 학생의 제출을 삭제할까요?\n(학생이 다시 제출하면 새로 올라옵니다.)')) return;
    db.ref(ROOT+'/'+key).remove().then(function(){ toast('삭제했어요'); }).catch(function(err){ alert('삭제 실패: '+(err&&err.code||err.message)); });
    return;
  }
  if(e.target.closest('.js-toggle')){ card.classList.toggle('open'); }
});

$('csvBtn').addEventListener('click', function(){
  if(!SUBS.length){ toast('내보낼 제출이 없어요'); return; }
  var head=['학번','이름','제출시각','계획서'];
  var rows=SUBS.map(function(s){ return [s.sid, s.name, fmtWhen(s.submittedAt), s.planText]; });
  var csv=[head].concat(rows).map(function(r){ return r.map(function(c){ return '"'+String(c==null?'':c).replace(/"/g,'""')+'"'; }).join(','); }).join('\r\n');
  var blob=new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='보고서계획서_제출현황.csv'; a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1000);
});
</script>
</body>
</html>
